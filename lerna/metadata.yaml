title: "Lerna Protocol: Factory Rights Settlement Profiles for Hydra/Cardano eUTxO"
short_title: "Lerna Protocol"
date: "2026-06-08"
type: "protocol thesis"
status: "protocol thesis with generic claim-materialisation acceptance argument"
summary: >
  A Hydra-native factory-rights settlement discipline for compact rights inside
  physical Hydra Heads or Interhead virtual Heads. The paper presents two
  settlement profiles: a Head-local factory profile with explicit signed
  snapshot availability assumptions, and a claim-materialisation profile based
  on ledger-enforced materialisation, evidence binding, exact conservation,
  release receipts, bounded continuation, and explicit liveness assumptions.
settlement_profiles:
  head_local_factory: "compact Head-local rights state, safe only when the latest Lerna state is in a signed Hydra snapshot before close or available as already-signed newer contest evidence"
  claim_materialisation: "ledger-enforced claim object, deterministic materialisation, release receipts, continuation discipline, and final zero-claim acceptance"
evidence_boundary:
  role: "instantiation evidence is corroborative, not the thesis claim"
  scope: "the thesis is stated at the level of protocol objects, transition invariants, and acceptance assumptions"
  next_review: "formalise Head-local transition/liveness, sharpen proof availability, no-stranding, and host-ledger limits"
