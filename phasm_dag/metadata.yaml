summary: >
  PHASMDAG-Core proposes a conservative high-throughput DAG protocol design
  that separates canonical ordering from dependency closure and strong finality.
  It preserves a GhostDAG-style ordering core while adding a closure-aware
  finality layer based on deterministic, work-weighted closure-certificate
  conditions.

